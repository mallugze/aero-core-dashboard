{% load static %}
<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "on-tertiary-fixed-variant": "#004c69",
                        "on-surface-variant": "#c6c6cd",
                        "on-secondary-fixed": "#111c2d",
                        "background": "#0c1324",
                        "error-container": "#93000a",
                        "primary": "#ffb874",
                        "on-surface": "#dce1fb",
                        "primary-fixed-dim": "#ffb874",
                        "on-primary-fixed": "#2d1600",
                        "on-primary-container": "#bd6d00",
                        "surface-container-lowest": "#070d1f",
                        "surface-variant": "#2e3447",
                        "surface-container": "#191f31",
                        "primary-container": "#271200",
                        "tertiary-fixed-dim": "#7bd0ff",
                        "on-primary": "#4b2800",
                        "outline-variant": "#45464d",
                        "surface-container-high": "#23293c",
                        "on-error-container": "#ffdad6",
                        "tertiary-fixed": "#c4e7ff",
                        "inverse-on-surface": "#2a3043",
                        "on-tertiary-fixed": "#001e2c",
                        "surface": "#0c1324",
                        "on-secondary-fixed-variant": "#3c475a",
                        "on-secondary": "#263143",
                        "outline": "#909097",
                        "secondary-container": "#3e495d",
                        "on-primary-fixed-variant": "#6a3b00",
                        "secondary": "#bcc7de",
                        "surface-tint": "#ffb874",
                        "surface-container-low": "#151b2d",
                        "on-tertiary": "#00354a",
                        "surface-bright": "#33394c",
                        "primary-fixed": "#ffdcbf",
                        "tertiary-container": "#001a27",
                        "surface-dim": "#0c1324",
                        "surface-container-highest": "#2e3447",
                        "on-secondary-container": "#aeb9d0",
                        "on-tertiary-container": "#008abb",
                        "tertiary": "#7bd0ff",
                        "error": "#ffb4ab",
                        "on-error": "#690005",
                        "inverse-surface": "#dce1fb",
                        "inverse-primary": "#8c5000",
                        "on-background": "#dce1fb",
                        "secondary-fixed-dim": "#bcc7de",
                        "secondary-fixed": "#d8e3fb"
                    },
                    fontFamily: {
                        "headline": ["Space Grotesk"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    },
                    borderRadius: { "DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem" },
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-card {
            background: rgba(25, 31, 49, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .aviation-gradient {
            background: linear-gradient(135deg, #ffb874 0%, #bd6d00 100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="text-on-surface font-body bg-background m-0 p-0 overflow-hidden">
    <video autoplay muted loop playsinline class="fixed top-0 left-0 w-full h-full object-cover -z-10">
      <source src="{% static 'core/videos/login-bg.mp4' %}" type="video/mp4">
    </video>

    <div class="fixed inset-0 bg-transparent -z-10"></div>

    <header class="fixed top-0 w-full z-50 bg-[#0c1324]/80 backdrop-blur-xl flex justify-between items-center px-8 h-20">
        <div class="flex items-center gap-3">
            <span class="material-symbols-outlined text-[#ffb874] text-2xl">flight_takeoff</span>
            <h1 class="text-2xl font-black tracking-tighter text-[#ffb874] uppercase font-['Space_Grotesk']">AERO_CORE</h1>
        </div>
    </header>

    <main class="relative z-10 h-screen w-full flex items-center justify-center px-6">
        <div class="w-full max-w-md">
            <div class="glass-card rounded-xl border border-white/10 p-8 md:p-10 shadow-2xl relative">
                <div class="absolute top-0 left-1/2 -translate-x-1/2 w-32 h-1 aviation-gradient rounded-b-full"></div>
                
                <div class="text-center mb-8">
                    <h2 class="font-headline text-3xl font-bold tracking-tight text-white mb-2">Access Portal</h2>
                    <p class="text-on-surface-variant text-[10px] tracking-widest uppercase font-bold opacity-70">AERO_CORE PREDICTIVE MAINTENANCE</p>
                </div>

                <form method="POST" class="space-y-6">
                    {% csrf_token %}
                    <div>
                        <label class="block text-[10px] font-bold uppercase tracking-widest text-on-surface-variant mb-2 ml-1">Terminal ID</label>
                        <div class="relative">
                            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-lg">alternate_email</span>
                            <input type="text" name="username" required class="w-full bg-[#070d1f]/60 border border-white/10 rounded-md py-4 pl-12 pr-4 text-white focus:ring-1 focus:ring-primary outline-none" placeholder="Username">
                        </div>
                    </div>

                    <div>
                        <div class="flex justify-between mb-2 ml-1">
                            <label class="block text-[10px] font-bold uppercase tracking-widest text-on-surface-variant">Security Protocol</label>
                            <a href="#" class="text-[10px] font-bold text-tertiary uppercase">Recover</a>
                        </div>
                        <div class="relative">
                            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-lg">lock</span>
                            <input type="password" name="password" required class="w-full bg-[#070d1f]/60 border border-white/10 rounded-md py-4 pl-12 pr-4 text-white focus:ring-1 focus:ring-primary outline-none" placeholder="••••••••">
                        </div>
                    </div>

                    <button type="submit" class="w-full aviation-gradient text-[#2d1600] font-bold py-4 rounded-md shadow-lg hover:brightness-110 transition-all flex items-center justify-center gap-2">
                        <span>INITIATE SESSION</span>
                        <span class="material-symbols-outlined">login</span>
                    </button>
                </form>
            </div>
        </div>
    </main>

    <footer class="fixed bottom-0 w-full z-50 bg-[#0c1324]/80 backdrop-blur px-8 py-4 flex justify-between items-center text-[10px] uppercase tracking-widest text-slate-500">
        <div>© 2024 AERO_CORE PREDICTIVE SYSTEMS</div>
        <div class="text-[#ffb874] font-bold">AERO_CORE // HQ</div>
    </footer>
</body>
</html>
